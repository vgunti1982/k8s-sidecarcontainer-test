apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nginx-with-otel-sidecar.fullname" . }}
  labels:
    {{- include "nginx-with-otel-sidecar.labels" . | nindent 4 }}
data:
  server_block.conf: |
    listen 8080;
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    location / {
      try_files $uri $uri/ =404;
    }